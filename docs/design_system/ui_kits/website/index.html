  moon:      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>,

  tag:       <><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></>,

  x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,

/* ══════════════════════════════════════════════════════════
   COMMAND MENU
══════════════════════════════════════════════════════════ */
function CommandMenu({ open, onClose, navigate, setArticle }) {
  const [q, setQ] = useState('');
  const inputRef = useRef(null);

  useEffect(() => {
    if (open) { setQ(''); setTimeout(() => inputRef.current?.focus(), 50); }
  }, [open]);

  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); open ? onClose() : null; }
      if (e.key === 'Escape') onClose();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [open, onClose]);

  const navItems = [
    { label: 'Home', icon: 'hash', action: () => { navigate('home'); onClose(); } },
    { label: 'Writing', icon: 'fileText', action: () => { navigate('writing'); onClose(); } },
    { label: 'Notes', icon: 'tag', action: () => { navigate('notes'); onClose(); } },
    { label: 'Projects', icon: 'layers', action: () => { navigate('projects'); onClose(); } },
    { label: 'About', icon: 'rss', action: () => { navigate('about'); onClose(); } },
  ];

  const postItems = POSTS.map(p => ({
    label: p.title, icon: 'fileText', meta: p.cat,
    action: () => { setArticle(p.slug); navigate('article'); onClose(); }
  }));

  const allItems = [...navItems.map(i => ({...i, group: 'Navigate'})), ...postItems.map(i => ({...i, group: 'Writing'}))];
  const filtered = q.trim() ? allItems.filter(i => i.label.toLowerCase().includes(q.toLowerCase()) || (i.meta||'').toLowerCase().includes(q.toLowerCase())) : allItems;
  const grouped = filtered.reduce((acc, item) => { (acc[item.group] = acc[item.group] || []).push(item); return acc; }, {});

  if (!open) return null;

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 200, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', paddingTop: '15vh' }}
      onClick={(e) => e.target === e.currentTarget && onClose()}>
      {/* Backdrop */}
      <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(4px)' }} onClick={onClose} />
      {/* Dialog */}
      <div style={{ position: 'relative', width: '100%', maxWidth: 520, margin: '0 16px', background: 'var(--bg-surface)', border: '1px solid var(--border-mid)', borderRadius: 14, boxShadow: 'var(--shadow-md)', overflow: 'hidden' }}>
        {/* Input */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px', borderBottom: '1px solid var(--border)' }}>
          <Icon name="search" size={16} color="var(--fg-3)" />
          <input ref={inputRef} value={q} onChange={e => setQ(e.target.value)} placeholder="Search pages, posts, projects…"
            style={{ flex: 1, background: 'none', border: 'none', outline: 'none', fontSize: 15, color: 'var(--fg)', fontFamily: 'var(--sans)' }} />
          <kbd style={{ fontSize: 11, color: 'var(--fg-3)', background: 'var(--bg-raised)', border: '1px solid var(--border)', borderRadius: 4, padding: '2px 6px' }}>esc</kbd>
        </div>
        {/* Results */}
        <div style={{ maxHeight: 360, overflowY: 'auto' }}>
          {Object.keys(grouped).length === 0 ? (
            <div style={{ padding: '32px 16px', textAlign: 'center', fontSize: 14, color: 'var(--fg-3)' }}>No results for "{q}"</div>
          ) : Object.entries(grouped).map(([group, items]) => (
            <div key={group}>
              <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.09em', textTransform: 'uppercase', color: 'var(--fg-3)', padding: '10px 16px 4px' }}>{group}</div>
              {items.map((item, i) => (
                <button key={i} onClick={item.action}
                  style={{ display: 'flex', alignItems: 'center', gap: 10, width: '100%', padding: '8px 16px', background: 'none', border: 'none', cursor: 'pointer', textAlign: 'left', borderRadius: 6, margin: '0 0', transition: 'background 100ms' }}
                  onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-raised)'}
                  onMouseLeave={e => e.currentTarget.style.background = 'none'}>
                  <Icon name={item.icon} size={15} color="var(--fg-3)" />
                  <span style={{ flex: 1, fontSize: 14, color: 'var(--fg)' }}>{item.label}</span>
                  {item.meta && <span style={{ fontSize: 12, color: 'var(--fg-3)' }}>{item.meta}</span>}
                </button>
              ))}
            </div>
          ))}
        </div>
        <div style={{ padding: '8px 16px', borderTop: '1px solid var(--border)', display: 'flex', gap: 16 }}>
          {[['↑↓', 'navigate'], ['↵', 'open'], ['esc', 'close']].map(([k, l]) => (
            <span key={k} style={{ fontSize: 11, color: 'var(--fg-3)', display: 'flex', alignItems: 'center', gap: 4 }}>
              <kbd style={{ background: 'var(--bg-raised)', border: '1px solid var(--border)', borderRadius: 3, padding: '1px 5px', fontFamily: 'var(--mono)', fontSize: 11 }}>{k}</kbd> {l}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════════════════ */
function Header({ page, navigate, dark, toggleDark, openCmd }) {
  const [mobileOpen, setMobileOpen] = useState(false);
  const links = [['Writing', 'writing'], ['Projects', 'projects'], ['Notes', 'notes'], ['About', 'about']];

  const linkStyle = (p) => ({
    fontSize: 14, fontWeight: 500, padding: '6px 10px', borderRadius: 5,
    color: page === p ? 'var(--accent)' : 'var(--fg-2)',
    textDecoration: 'none', transition: 'color 120ms, background 120ms',
    cursor: 'pointer',
  });

  return (
    <header style={{ position: 'sticky', top: 0, zIndex: 100, background: `color-mix(in srgb, var(--bg) 92%, transparent)`, backdropFilter: 'blur(10px)', borderBottom: '1px solid var(--border)' }}>
      <div style={{ maxWidth: 1024, margin: '0 auto', padding: '0 28px', height: 56, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <a href="#" style={{ fontFamily: 'var(--serif)', fontSize: 18, fontWeight: 400, color: 'var(--fg)', textDecoration: 'none', whiteSpace: 'nowrap', letterSpacing: '-0.01em' }}
          onClick={e => { e.preventDefault(); navigate('home'); setMobileOpen(false); }}>
          Jatto Abdul
        </a>
        <nav style={{ display: 'flex', alignItems: 'center', gap: 0 }}>
          {links.map(([label, p]) => (
            <a key={p} href="#" style={linkStyle(p)} onClick={e => { e.preventDefault(); navigate(p); }}
              onMouseEnter={e => { if (page !== p) { e.currentTarget.style.color = 'var(--fg)'; e.currentTarget.style.background = 'var(--bg-raised)'; } }}
              onMouseLeave={e => { e.currentTarget.style.color = page === p ? 'var(--accent)' : 'var(--fg-2)'; e.currentTarget.style.background = 'transparent'; }}>
              {label}
            </a>
          ))}
          <div style={{ width: 1, height: 18, background: 'var(--border)', margin: '0 8px' }} />
          {/* Command menu trigger */}
          <button onClick={openCmd} title="Search (⌘K)"
            style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '5px 9px', borderRadius: 5, background: 'var(--bg-raised)', border: '1px solid var(--border)', color: 'var(--fg-3)', fontSize: 12, cursor: 'pointer', transition: 'border-color 150ms' }}
            onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--border-mid)'}
            onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}>
            <Icon name="search" size={13} />
            <kbd style={{ fontFamily: 'var(--mono)', fontSize: 11 }}>⌘K</kbd>
          </button>
          {/* Dark mode toggle */}
          <button onClick={toggleDark} title="Toggle dark mode"
            style={{ marginLeft: 6, padding: 7, borderRadius: 5, background: 'none', border: 'none', color: 'var(--fg-3)', cursor: 'pointer', display: 'flex', alignItems: 'center', transition: 'color 150ms' }}
            onMouseEnter={e => e.currentTarget.style.color = 'var(--fg)'}
            onMouseLeave={e => e.currentTarget.style.color = 'var(--fg-3)'}>
            <Icon name={dark ? 'sun' : 'moon'} size={16} />
          </button>
        </nav>
      </div>
      {mobileOpen && (
        <div style={{ borderTop: '1px solid var(--border)', background: 'var(--bg)', padding: '12px 20px 20px' }}>
          {links.map(([label, p]) => (
            <a key={p} href="#" style={{ display: 'block', padding: '10px 0', borderBottom: '1px solid var(--border)', fontSize: 15, fontWeight: 500, color: 'var(--fg-2)', textDecoration: 'none' }}
              onClick={e => { e.preventDefault(); navigate(p); setMobileOpen(false); }}>{label}</a>
          ))}
        </div>
      )}
    </header>
  );
}

              {s}
            </button>
          ))}

          <div style={{ marginLeft: 'auto', display: 'flex', gap: 4, alignItems: 'center' }}>
            <span style={{ fontSize: 11, color: 'var(--fg-3)' }}>Feed state:</span>

              <button key={s} onClick={() => setMediumState(s)}

            ))}
          </div>
        </div>

        {/* Medium feed state UI */}
        {mediumState === 'loading' && (
          <div style={{ marginBottom: 28 }}>
            <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.09em', textTransform: 'uppercase', color: 'var(--fg-3)', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 6 }}>

        )}
      </div>
    </main>
  );

              <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.09em', textTransform: 'uppercase', color: 'var(--fg-3)', marginBottom: 2 }}>{grp}</div>
              {lnks.map(([l, p]) => (
                <a key={l} href="#" onClick={e => { e.preventDefault(); if (p) navigate(p); }}
                  style={{ fontSize: 13, color: 'var(--fg-2)', textDecoration: 'none' }}>{l}</a>
              ))}
            </div>
          ))}
        </div>
      </div>
      <div style={{ maxWidth: 960, margin: '0 auto', display: 'flex', justifyContent: 'space-between', paddingTop: 16, borderTop: '1px solid var(--border)' }}>
        <span style={{ fontSize: 12, color: 'var(--fg-3)' }}>© {new Date().getFullYear()} Jatto Abdul</span>
        <span style={{ fontSize: 12, color: 'var(--fg-3)' }}>jattoabdul.com</span>
      </div>
    </footer>
  );
}

/* ══════════════════════════════════════════════════════════
   SHARED
══════════════════════════════════════════════════════════ */
function SectionHeader({ title, action, onAction }) {
  return (
    <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 20 }}>
      <h2 style={{ fontFamily: 'var(--serif)', fontSize: 22, fontWeight: 400, color: 'var(--fg)', letterSpacing: '-0.01em' }}>{title}</h2>
      <a href="#" onClick={e => { e.preventDefault(); onAction(); }}
        style={{ fontSize: 13, fontWeight: 600, color: 'var(--accent)', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: 4, whiteSpace: 'nowrap' }}>
        {action} <Icon name="arrowRight" size={12} color="var(--accent)" />
      </a>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState('home');
  const [article, setArticle] = useState('pipelines');
  const [dark, setDark] = useState(false);
  const [cmdOpen, setCmdOpen] = useState(false);

  // Restore dark mode from localStorage
  useEffect(() => {
    const saved = localStorage.getItem('ja-dark');
    if (saved === 'true') setDark(true);
  }, []);

  useEffect(() => {
    document.documentElement.className = dark ? 'dark' : '';
    document.body.className = dark ? 'dark' : '';
    localStorage.setItem('ja-dark', dark);
  }, [dark]);

  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setCmdOpen(v => !v); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  const navigate = (p) => { setPage(p); window.scrollTo({ top: 0, behavior: 'instant' }); };

  return (
    <div className={dark ? 'dark' : ''}>
      <Header page={page} navigate={navigate} dark={dark} toggleDark={() => setDark(v => !v)} openCmd={() => setCmdOpen(true)} />
      <CommandMenu open={cmdOpen} onClose={() => setCmdOpen(false)} navigate={navigate} setArticle={setArticle} />
      {page === 'home'     && <HomePage navigate={navigate} setArticle={setArticle} />}
      {page === 'writing'  && <WritingPage navigate={navigate} setArticle={setArticle} />}
      {page === 'article'  && <ArticlePage slug={article} navigate={navigate} />}
      {page === 'notes'    && <NotesPage navigate={navigate} setArticle={setArticle} />}
      {page === 'projects' && <ProjectsPage />}
      {page === 'about'    && <AboutPage />}
      <Footer navigate={navigate} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
