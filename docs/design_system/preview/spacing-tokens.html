<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FAFAF8; padding: 24px; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .bar { background: #1A6B4A; border-radius: 2px; height: 20px; }
  .token { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #9C9A95; width: 72px; flex-shrink: 0; }
  .val { font-size: 11px; color: #6B6860; width: 36px; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: #9C9A95; margin-bottom: 12px; }
</style>
</head>
<body>
  <div class="label">Spacing Scale</div>
  <div class="row"><div class="token">--space-1</div><div class="bar" style="width:4px"></div><div class="val">4px</div></div>
  <div class="row"><div class="token">--space-2</div><div class="bar" style="width:8px"></div><div class="val">8px</div></div>
  <div class="row"><div class="token">--space-3</div><div class="bar" style="width:12px"></div><div class="val">12px</div></div>
  <div class="row"><div class="token">--space-4</div><div class="bar" style="width:16px"></div><div class="val">16px</div></div>
  <div class="row"><div class="token">--space-5</div><div class="bar" style="width:20px"></div><div class="val">20px</div></div>
  <div class="row"><div class="token">--space-6</div><div class="bar" style="width:24px"></div><div class="val">24px</div></div>
  <div class="row"><div class="token">--space-8</div><div class="bar" style="width:32px"></div><div class="val">32px</div></div>
  <div class="row"><div class="token">--space-10</div><div class="bar" style="width:40px"></div><div class="val">40px</div></div>
  <div class="row"><div class="token">--space-12</div><div class="bar" style="width:48px"></div><div class="val">48px</div></div>
  <div class="row"><div class="token">--space-16</div><div class="bar" style="width:64px"></div><div class="val">64px</div></div>
  <div class="row"><div class="token">--space-20</div><div class="bar" style="width:80px"></div><div class="val">80px</div></div>
  <div class="row"><div class="token">--space-24</div><div class="bar" style="width:96px"></div><div class="val">96px</div></div>
  <div class="row"><div class="token">--space-32</div><div class="bar" style="width:128px"></div><div class="val">128px</div></div>
</body>
</html>
