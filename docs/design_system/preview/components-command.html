<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FAFAF9; padding: 24px; display: flex; align-items: flex-start; justify-content: center; }
  .menu { width: 440px; background: #fff; border: 1px solid #D6D3D1; border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.10); overflow: hidden; }
  .input-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #E7E5E4; }
  .input-row svg { flex-shrink: 0; }
  .fake-input { flex: 1; font-size: 15px; color: #18181B; font-family: 'Plus Jakarta Sans', sans-serif; }
  .fake-placeholder { flex: 1; font-size: 15px; color: #A8A29E; font-family: 'Plus Jakarta Sans', sans-serif; }
  kbd { font-size: 11px; color: #A8A29E; background: #F5F5F4; border: 1px solid #E7E5E4; border-radius: 4px; padding: 2px 6px; font-family: 'JetBrains Mono', monospace; }
  .group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: #A8A29E; padding: 10px 16px 4px; }
  .item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; }
  .item.active { background: #F5F5F4; }
  .item-text { flex: 1; font-size: 14px; color: #18181B; }
  .item-meta { font-size: 12px; color: #A8A29E; }
  .footer { border-top: 1px solid #E7E5E4; padding: 8px 16px; display: flex; gap: 16px; }
  .hint { font-size: 11px; color: #A8A29E; display: flex; align-items: center; gap: 4px; }
  svg.icon { width: 15px; height: 15px; stroke: #A8A29E; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="menu">
    <div class="input-row">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <div class="fake-placeholder">Search pages, posts, projects…</div>
      <kbd>esc</kbd>
    </div>
    <div class="group-label">Navigate</div>
    <div class="item active">
      <svg class="icon" viewBox="0 0 24 24"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
      <span class="item-text">Home</span>
    </div>
    <div class="item">
      <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
      <span class="item-text">Writing</span>
    </div>
    <div class="item">
      <svg class="icon" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      <span class="item-text">Projects</span>
    </div>
    <div class="group-label">Writing</div>
    <div class="item">
      <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="item-text">Designing data pipelines that don't lie to you</span>
      <span class="item-meta">Backend</span>
    </div>
    <div class="item">
      <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="item-text">Building AI-assisted workflows without the hype</span>
      <span class="item-meta">Applied AI</span>
    </div>
    <div class="footer">
      <span class="hint"><kbd>↑↓</kbd> navigate</span>
      <span class="hint"><kbd>↵</kbd> open</span>
      <span class="hint"><kbd>esc</kbd> close</span>
    </div>
  </div>
</body>
</html>
