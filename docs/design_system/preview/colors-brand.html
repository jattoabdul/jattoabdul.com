<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FAFAF8; padding: 24px; }
  .row { display: flex; gap: 8px; margin-bottom: 16px; }
  .swatch { flex: 1; }
  .chip { height: 56px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.07); }
  .name { font-size: 11px; font-weight: 500; color: #6B6860; margin-top: 5px; }
  .hex  { font-size: 10px; color: #9C9A95; margin-top: 1px; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: #9C9A95; margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="label">Green — Primary Accent</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#EDF5F0"></div><div class="name">50</div><div class="hex">#EDF5F0</div></div>
    <div class="swatch"><div class="chip" style="background:#D0E9DC"></div><div class="name">100</div><div class="hex">#D0E9DC</div></div>
    <div class="swatch"><div class="chip" style="background:#A0D3B9"></div><div class="name">200</div><div class="hex">#A0D3B9</div></div>
    <div class="swatch"><div class="chip" style="background:#5EAF86"></div><div class="name">300</div><div class="hex">#5EAF86</div></div>
    <div class="swatch"><div class="chip" style="background:#2E9968"></div><div class="name">400</div><div class="hex">#2E9968</div></div>
    <div class="swatch"><div class="chip" style="background:#1A6B4A; outline: 3px solid #1A6B4A; outline-offset: 2px;"></div><div class="name" style="color:#1A6B4A;font-weight:700;">500 ★</div><div class="hex">#1A6B4A</div></div>
    <div class="swatch"><div class="chip" style="background:#145538"></div><div class="name">600</div><div class="hex">#145538</div></div>
    <div class="swatch"><div class="chip" style="background:#0E3D28"></div><div class="name">700</div><div class="hex">#0E3D28</div></div>
    <div class="swatch"><div class="chip" style="background:#082617"></div><div class="name">800</div><div class="hex">#082617</div></div>
  </div>

  <div class="label">Warm Neutrals</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#FFFFFF; border:1px solid #E5E3DC;"></div><div class="name">White</div><div class="hex">#FFFFFF</div></div>
    <div class="swatch"><div class="chip" style="background:#FAFAF8; border:1px solid #E5E3DC;"></div><div class="name">Paper</div><div class="hex">#FAFAF8</div></div>
    <div class="swatch"><div class="chip" style="background:#F5F4F0"></div><div class="name">Paper Mid</div><div class="hex">#F5F4F0</div></div>
    <div class="swatch"><div class="chip" style="background:#ECEAE3"></div><div class="name">Paper Dark</div><div class="hex">#ECEAE3</div></div>
    <div class="swatch"><div class="chip" style="background:#E5E3DC"></div><div class="name">Border</div><div class="hex">#E5E3DC</div></div>
    <div class="swatch"><div class="chip" style="background:#9C9A95"></div><div class="name">Muted</div><div class="hex">#9C9A95</div></div>
    <div class="swatch"><div class="chip" style="background:#6B6860"></div><div class="name">Secondary</div><div class="hex">#6B6860</div></div>
    <div class="swatch"><div class="chip" style="background:#1A1916"></div><div class="name">Ink</div><div class="hex">#1A1916</div></div>
  </div>
</body>
</html>
