name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow only one concurrent CI run per ref; cancel in-progress runs on a new push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        # Build with feeds disabled so CI doesn't depend on third-party
        # availability (Medium / YouTube). Production builds on Railway use
        # the real env vars from the service settings.
        env:
          NEXT_PUBLIC_ENABLE_MEDIUM_FEED: 'false'
          NEXT_PUBLIC_ENABLE_YOUTUBE_FEED: 'false'
          NEXT_PUBLIC_HERO_VARIANT: 'terminal'
        run: npm run build
